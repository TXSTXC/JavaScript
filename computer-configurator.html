<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Computer Configurator</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./comp-config-styles.css">
    </head>
    <body>

        <header class="header-container-row">
                <img id="header-logo" src="./media/comp-config-media/lukepc-logo.png">
                <div class="header-links">
                    <a class="header-options" href="#" style="font-weight: bold;">HOME</a>
                    <span>|</span>
                    <a class="header-options" href="#">ABOUT</a>
                    <span>|</span>
                    <a class="header-options" href="#">MY ACCOUNT</a>
                    <span>|</span>
                    <a class="header-options" href="#">CONTACT</a>  
                </div> 
            </div>      
        </header>


        <main class="width-container-col">
            <h1 class="center">Luke's Custom PC's</h1>
            <div class="container-row">
                <p class=""><strong>Small enough to <span class="span-large-bold">CARE</span> and big enough to deliver.</br></br>
                    Bridging the gap of <span class="span-large-bold">QUALITY</span> and service in the market.</br></br>
                    Offering high quality components and peripherals, at <span class="span-large-bold">FAIR</span> prices.</br></br>
                </strong></p> 
                <img id="main-logo" src="./media/comp-config-media/lukepc-logo-full-wide.png">
            </div>
        </main>

                                            <!--  MAIN SELECTION SECTION  -->
        <div class="select-container-col">
            <h2 class="underline">CONFIGURATOR</h2>

            <!-- TOWER CASE SELECT -->
            <div class="container-row">
                <div class="selection-row-left">
                    <img class="icon" src="./media/comp-config-media/tower-icon.png">
                    <label for="towerCase">Tower Case</label>
                    <select id="towerCase" class="" name="TowerCase">
                    <option value="">Select an option</option>
                    <option value="razer">RAZER</option>
                    <option value="msi">MSI</option>
                    <option value="coolermaster">CoolerMaster</option>
                    </select>  
                </div>

                <div class="selection-row-right">
                    <img id="towercase-image" class="product-icon" src="./media/comp-config-media/lukepc-logo.png">
                    <div class="">
                        <p id="towercase-name" class="product-name"></p>
                       <p id="towercase-price" class="product-price"></p>
                       <p id="towercase-desc" class="product-desc"></p>
                    </div>
                    
                </div>
            </div>
        </div>

        <!-- MOTHERBOARD -->
            <div class="container-row">
                <div class="selection-row-left">
                    <img class="icon" src="./media/comp-config-media/tower-icon.png">
                    <label for="motherboard">MOTHERBOARD</label>
                    <select id="motherboard" class="" name="motherboard">
                    <option value="">Select an option</option>
                    <option value="asus">Option 1</option>
                    <option value="intel">Option 2</option>
                    <option value="amd">Option 3</option>
                    </select>  
                </div>

                <div class="selection-row-right">
                    <img id="motherboard-image" class="product-icon" src="./media/comp-config-media/lukepc-logo.png">
                    <div class="">
                        <p id="motherboard-name" class="product-name"></p>
                       <p id="motherboard-price" class="product-price"></p>
                       <p id="motherboard-desc" class="product-desc"></p>
                    </div>
            </div>
        </div>

        <!-- CPU -->
            <div class="container-row">
                <div class="selection-row-left">
                    <img class="icon" src="./media/comp-config-media/tower-icon.png">
                    <label for="cpu">CPU</label>
                    <select id="cpu" class="" name="cpu">
                    <option value="">Select an option</option>
                    <option value="i5">Option 1</option>
                    <option value="i7">Option 2</option>
                    <option value="i9">Option 3</option>
                    <option value="ryzen5">Option 3</option>
                    <option value="ryzen7">Option 3</option>
                    <option value="ryzen9">Option 3</option>
                    </select>  
                </div>

                <div class="selection-row-right">
                    <img id="cpu-image" class="product-icon" src="./media/comp-config-media/lukepc-logo.png">
                    <div class="">
                        <p id="cpu-name" class="product-name"></p>
                       <p id="cpu-price" class="product-price"></p>
                       <p id="cpu-desc" class="product-desc"></p>
                    </div>
            </div>
        </div>

        <!-- RAM -->
            <div class="container-row">
                <div class="selection-row-left">
                    <img class="icon" src="./media/comp-config-media/tower-icon.png">
                    <label for="componentX">RAM</label>
                    <select id="componentX" class="" name="componentX">
                    <option disabled selected="selected">Select an option</option>
                    <option>Option 1</option>
                    <option>Option 2</option>
                    <option>Option 3</option>
                    </select>  
                </div>

                <div class="selection-row-right">
                    <img class="product-icon" src="./media/comp-config-media/lukepc-logo.png">
                    <p class="product-price">Price: £900</p>
                </div>
            </div>
        </div>

        <!-- Graphics Card -->
            <div class="container-row">
                <div class="selection-row-left">
                    <img class="icon" src="./media/comp-config-media/tower-icon.png">
                    <label for="componentX">Graphics Card</label>
                    <select id="componentX" class="" name="componentX">
                    <option disabled selected="selected">Select an option</option>
                    <option>Option 1</option>
                    <option>Option 2</option>
                    <option>Option 3</option>
                    </select>  
                </div>

                <div class="selection-row-right">
                    <img class="product-icon" src="./media/comp-config-media/lukepc-logo.png">
                    <p class="product-price">Price: £900</p>
                </div>
            </div>
        </div>

        <!-- TOTAL COST -->
         <div class="container-row">
                
                <div class="selection-row-right">
                    <p class="total-cost">Total Cost:</p>
                    <p id="total-cost" class="total-cost"></p>
                </div>
            </div>
        </div>

        
        <script src="./objects.js" async defer></script>
    </body>
</html>
